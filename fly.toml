# fly.toml — serves the Vue course site and the course-sandbox-runner /api from
# one machine. The Daytona sandboxes run remotely, so this machine stays small.
# Set these secrets before the first deploy:
#   fly secrets set DAYTONA_KEY=...
#   # so the runner can point Module 4 sandboxes at the LLM proxy (see litellm/):
#   fly secrets set LLM_PROXY_URL=https://temporal-loan-llm-proxy.fly.dev
#   fly secrets set LLM_PROXY_KEY=...          # the proxy's LITELLM_MASTER_KEY

app = "temporal-training-agentic-loan-origination"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  COURSE_DIST_DIR = "/app/course-dist"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

# The Temporal UI reverse proxy (course-sandbox-runner, port 8081 = PORT+1). It
# can't share 8080: it serves the sandbox UI at the root, so it needs its own
# origin. The browser reaches it at https://<app>.fly.dev:8081 — same host as the
# course site, so its re-scoped auth cookies stay same-site. The frontend derives
# this from the page host + the port reported by /api/health (uiProxyPort).
[[services]]
  internal_port = 8081
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[services.ports]]
    port = 8081
    handlers = ["tls", "http"]

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
