# fly.toml app configuration file generated for temporal-training-agentic-loan-origination on 2026-06-01T11:52:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'temporal-training-agentic-loan-origination'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  COURSE_DIST_DIR = '/app/course-dist'
  HOST = '0.0.0.0'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
