name: Fly Deploy

# Deploys the course site + sandbox runner to Fly.io on push to main. The LLM
# proxy under litellm/ has its own workflow (fly-deploy-litellm.yml), so changes
# there don't redeploy (and restart) the portal.
# Requires a repo secret FLY_API_TOKEN (create one with `fly tokens create deploy`).
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'litellm/**'
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
