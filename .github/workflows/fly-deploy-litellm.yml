name: Fly Deploy (LLM proxy)

# Deploys the LiteLLM proxy (litellm/) to Fly.io when its config changes.
# Scoped to the proxy's own files so a course-content push doesn't restart the
# proxy mid-workshop, and vice-versa.
#
# Requires the repo secret FLY_API_TOKEN to have deploy access to BOTH the portal
# and the proxy apps. An app-scoped token (`fly tokens create deploy`) only covers
# one app — use an org-scoped token instead: `fly tokens create org <org-slug>`.
on:
  push:
    branches:
      - main
    paths:
      - 'litellm/Dockerfile'
      - 'litellm/config.yaml'
      - 'litellm/fly.toml'
      - '.github/workflows/fly-deploy-litellm.yml'
  workflow_dispatch:

concurrency:
  group: fly-deploy-litellm
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy LLM proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Run from litellm/ so flyctl picks up litellm/fly.toml + litellm/Dockerfile.
      - run: flyctl deploy --remote-only
        working-directory: litellm
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
