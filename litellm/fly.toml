# fly.toml app configuration file generated for temporal-loan-llm-proxy on 2026-06-01T21:43:39+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'temporal-loan-llm-proxy'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health/liveliness'

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  # LiteLLM is memory-hungry on startup; 1 GB can OOM-loop (connection resets /
  # ECONNRESET from the proxy). 2 GB gives it headroom.
  memory_mb = 4096
