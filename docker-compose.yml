services:
  ollama:
    image: ollama/ollama:latest
    container_name: loan-demo-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot sidecar that pulls the model once Ollama is up, then exits.
  # qwen2.5:1.5b (~1GB) is the smallest Qwen with reasonably reliable tool calling.
  # Bump to qwen2.5:3b or qwen2.5:7b for more reliable multi-turn tool JSON
  # at the cost of CPU inference time.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
    entrypoint: ["sh", "-c", "ollama pull $$OLLAMA_MODEL"]
    restart: "no"

volumes:
  ollama_data:
